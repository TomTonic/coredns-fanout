name: Auto-Build CoreDNS with Fanout Test Images

on:
  push:
    branches:
      - main
    paths:
      - build-versions.json
  pull_request:
    paths:
      - build-versions.json
  workflow_dispatch:

concurrency:
  group: auto-build-test
  cancel-in-progress: false

jobs:
  determine-version:
    name: Determine Candidate Version
    runs-on: ubuntu-latest
    outputs:
      build_needed: ${{ steps.version.outputs.build_needed }}
      release_version: ${{ steps.version.outputs.release_version }}
      image_version: ${{ steps.version.outputs.image_version }}
      coredns_tag: ${{ steps.deps.outputs.coredns_tag }}
      fanout_tag: ${{ steps.deps.outputs.fanout_tag }}
      go_image: ${{ steps.deps.outputs.go_image }}
      runtime_base: ${{ steps.deps.outputs.runtime_base }}
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load pinned dependency versions
        id: deps
        run: |
          set -euo pipefail

          FILE="build-versions.json"
          test -f "${FILE}"

          COREDNS_TAG=$(jq -r '.coredns_tag // ""' "${FILE}")
          FANOUT_TAG=$(jq -r '.fanout_tag // ""' "${FILE}")
          GO_IMAGE=$(jq -r '.go_image // ""' "${FILE}")
          RUNTIME_BASE=$(jq -r '.runtime_base // ""' "${FILE}")

          if [ -z "${COREDNS_TAG}" ] || [ -z "${FANOUT_TAG}" ] || [ -z "${GO_IMAGE}" ] || [ -z "${RUNTIME_BASE}" ]; then
            echo "${FILE} is missing required values." >&2
            exit 1
          fi

          {
            echo "coredns_tag=${COREDNS_TAG}"
            echo "fanout_tag=${FANOUT_TAG}"
            echo "go_image=${GO_IMAGE}"
            echo "runtime_base=${RUNTIME_BASE}"
          } >> "$GITHUB_OUTPUT"

      - name: Determine next release version and test tag
        id: version
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_RUN_NUMBER: ${{ github.run_number }}
          GIT_RUN_ATTEMPT: ${{ github.run_attempt }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          NEW_COREDNS="${{ steps.deps.outputs.coredns_tag }}"
          NEW_FANOUT="${{ steps.deps.outputs.fanout_tag }}"
          NEW_GO_IMAGE="${{ steps.deps.outputs.go_image }}"
          NEW_RUNTIME_BASE="${{ steps.deps.outputs.runtime_base }}"

          STORED_COREDNS=$(jq -r '.coredns // ""' version.json)
          STORED_FANOUT=$(jq -r '.fanout // ""' version.json)
          STORED_GO_IMAGE=$(jq -r '.go // ""' version.json)
          STORED_RUNTIME_BASE=$(jq -r '.alpine // ""' version.json)
          STORED_VERSION=$(jq -r '.version // "2.0.0"' version.json)

          SHORT_SHA=$(printf '%s' "${GIT_SHA}" | cut -c1-7)
          TEST_SUFFIX="test.${GIT_RUN_NUMBER}.${GIT_RUN_ATTEMPT}.${SHORT_SHA}"

          echo "Released state: coredns=${STORED_COREDNS} fanout=${STORED_FANOUT} go_image=${STORED_GO_IMAGE} runtime_base=${STORED_RUNTIME_BASE} version=${STORED_VERSION}"
          echo "Candidate deps: coredns=${NEW_COREDNS} fanout=${NEW_FANOUT} go_image=${NEW_GO_IMAGE} runtime_base=${NEW_RUNTIME_BASE}"

          if [ "${NEW_COREDNS}" = "${STORED_COREDNS}" ] && \
             [ "${NEW_FANOUT}" = "${STORED_FANOUT}" ] && \
             [ "${NEW_GO_IMAGE}" = "${STORED_GO_IMAGE}" ] && \
             [ "${NEW_RUNTIME_BASE}" = "${STORED_RUNTIME_BASE}" ]; then
            if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
              CANDIDATE_VERSION="${STORED_VERSION}"
              echo "No dependency changes, but manual trigger requested. Rebuilding test image for v${CANDIDATE_VERSION}."
              {
                echo "build_needed=true"
                echo "release_version=${CANDIDATE_VERSION}"
                echo "image_version=${CANDIDATE_VERSION}-${TEST_SUFFIX}"
              } >> "$GITHUB_OUTPUT"
            else
              echo "No dependency changes detected. Skipping build."
              {
                echo "build_needed=false"
                echo "release_version=${STORED_VERSION}"
                echo "image_version=${STORED_VERSION}-${TEST_SUFFIX}"
              } >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          if [ -z "${STORED_COREDNS}" ] || [ -z "${STORED_FANOUT}" ]; then
            CANDIDATE_VERSION="2.0.0"
            echo "Initial build candidate: v${CANDIDATE_VERSION}"
            {
              echo "build_needed=true"
              echo "release_version=${CANDIDATE_VERSION}"
              echo "image_version=${CANDIDATE_VERSION}-${TEST_SUFFIX}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAJOR=$(echo "${STORED_VERSION}" | cut -d. -f1)
          MINOR=$(echo "${STORED_VERSION}" | cut -d. -f2)
          PATCH=$(echo "${STORED_VERSION}" | cut -d. -f3)

          OLD_CD_MINOR=$(echo "${STORED_COREDNS}" | sed 's/^v//' | cut -d. -f2)
          NEW_CD_MINOR=$(echo "${NEW_COREDNS}" | sed 's/^v//' | cut -d. -f2)
          OLD_FO_MINOR=$(echo "${STORED_FANOUT}" | sed 's/^v//' | cut -d. -f2)
          NEW_FO_MINOR=$(echo "${NEW_FANOUT}" | sed 's/^v//' | cut -d. -f2)

          if [ "${OLD_CD_MINOR}" != "${NEW_CD_MINOR}" ] || \
             [ "${OLD_FO_MINOR}" != "${NEW_FO_MINOR}" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
            echo "Minor bump candidate (CoreDNS or Fanout minor version changed)"
          else
            PATCH=$((PATCH + 1))
            echo "Patch bump candidate (patch / Go image / runtime base image change)"
          fi

          CANDIDATE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Candidate release version: v${CANDIDATE_VERSION}"
          echo "Test image version: v${CANDIDATE_VERSION}-${TEST_SUFFIX}"
          {
            echo "build_needed=true"
            echo "release_version=${CANDIDATE_VERSION}"
            echo "image_version=${CANDIDATE_VERSION}-${TEST_SUFFIX}"
          } >> "$GITHUB_OUTPUT"

  validate-test-build:
    name: Validate Candidate Build
    needs: determine-version
    if: needs.determine-version.outputs.build_needed == 'true' && github.event_name == 'pull_request'
    uses: ./.github/workflows/publish-images.yml
    with:
      git_ref: ${{ github.sha }}
      version: ${{ needs.determine-version.outputs.image_version }}
      coredns_tag: ${{ needs.determine-version.outputs.coredns_tag }}
      fanout_tag: ${{ needs.determine-version.outputs.fanout_tag }}
      go_image: ${{ needs.determine-version.outputs.go_image }}
      runtime_base: ${{ needs.determine-version.outputs.runtime_base }}
      channel: test
      publish_images: false
    secrets: inherit

  publish-test-images:
    name: Publish Test Images
    needs: determine-version
    if: needs.determine-version.outputs.build_needed == 'true' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/publish-images.yml
    with:
      git_ref: ${{ github.sha }}
      version: ${{ needs.determine-version.outputs.image_version }}
      coredns_tag: ${{ needs.determine-version.outputs.coredns_tag }}
      fanout_tag: ${{ needs.determine-version.outputs.fanout_tag }}
      go_image: ${{ needs.determine-version.outputs.go_image }}
      runtime_base: ${{ needs.determine-version.outputs.runtime_base }}
      channel: test
      publish_images: true
    secrets: inherit
