name: Publish CoreDNS with Fanout Images

on:
  workflow_call:
    inputs:
      git_ref:
        required: true
        type: string
      version:
        required: true
        type: string
      coredns_tag:
        required: true
        type: string
      fanout_tag:
        required: true
        type: string
      go_image:
        required: true
        type: string
      runtime_base:
        required: true
        type: string
      channel:
        required: true
        type: string
      publish_images:
        required: false
        type: boolean
        default: true

jobs:
  preflight:
    name: Preflight (pull/test/build binaries once)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COREDNS_TAG: ${{ inputs.coredns_tag }}
      FANOUT_TAG: ${{ inputs.fanout_tag }}
      GO_IMAGE: ${{ inputs.go_image }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.git_ref }}

      - name: Verify pinned Go image contents
        run: |
          set -euo pipefail

          IMAGE_WITHOUT_DIGEST="${GO_IMAGE%@*}"
          IMAGE_TAG="${IMAGE_WITHOUT_DIGEST##*:}"
          EXPECTED_GO_VERSION="${IMAGE_TAG%%-*}"
          ACTUAL_GO_TOOLCHAIN=$(docker run --rm --platform linux/amd64 "${GO_IMAGE}" go version | awk '{print $3, $4}')
          ACTUAL_GO_VERSION=$(printf '%s\n' "${ACTUAL_GO_TOOLCHAIN}" | awk '{print $1}' | sed 's/^go//')

          if [ -z "${EXPECTED_GO_VERSION}" ] || [ "${EXPECTED_GO_VERSION}" = "${IMAGE_WITHOUT_DIGEST}" ]; then
            echo "Unable to derive expected Go version from go_image: ${GO_IMAGE}" >&2
            exit 1
          fi

          echo "Expected Go version:   ${EXPECTED_GO_VERSION}"
          echo "Actual Go toolchain:   ${ACTUAL_GO_TOOLCHAIN}"

          if [ "${ACTUAL_GO_VERSION}" != "${EXPECTED_GO_VERSION}" ]; then
            echo "Pinned go_image tag does not match the Go toolchain inside the image." >&2
            exit 1
          fi

      - name: Get CoreDNS & Plugin
        run: |
          set -euo pipefail

          git clone --branch "${COREDNS_TAG}" --depth 1 https://github.com/coredns/coredns.git
          cd coredns
          echo "fanout:github.com/TomTonic/fanout" >> plugin.cfg

      - name: Restore Go caches
        uses: actions/cache@v5
        with:
          path: |
            .cache/go-mod
            .cache/go-build
          key: ${{ runner.os }}-go-cache-${{ hashFiles('build-versions.json') }}
          restore-keys: |
            ${{ runner.os }}-go-cache-

      - name: Pull pinned Go image once
        run: docker pull "${{ env.GO_IMAGE }}"

      - name: Test once + build all target binaries
        run: |
          set -euo pipefail

          mkdir -p artifacts
          mkdir -p .cache/go-mod .cache/go-build

          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -v "${{ github.workspace }}/.cache/go-mod:/cache/go-mod" \
            -v "${{ github.workspace }}/.cache/go-build:/cache/go-build" \
            -w /work/coredns \
            -e FANOUT_TAG="${{ env.FANOUT_TAG }}" \
            -e GOFLAGS=-buildvcs=false \
            -e GOMODCACHE=/cache/go-mod \
            -e GOCACHE=/cache/go-build \
            "${{ env.GO_IMAGE }}" \
            sh -ec '
              apt-get -qq update
              apt-get -qq install --no-install-recommends make git gcc libc6-dev ca-certificates
              rm -rf /var/lib/apt/lists/*

              git config --global --add safe.directory /work/coredns

              go mod edit -require github.com/TomTonic/fanout@${FANOUT_TAG}
              go mod tidy

              make gen
              go test $(go list ./... | grep -Ev "^github.com/coredns/coredns/(test|coremain)$")

              mkdir -p /work/artifacts

              export GOOS=linux
              export GOARCH=amd64
              unset GOARM
              echo "Building for GOOS=${GOOS}, GOARCH=${GOARCH}, GOARM=n/a"
              make coredns
              cp coredns /work/artifacts/coredns-amd64

              export GOOS=linux
              export GOARCH=arm64
              unset GOARM
              echo "Building for GOOS=${GOOS}, GOARCH=${GOARCH}, GOARM=n/a"
              make coredns
              cp coredns /work/artifacts/coredns-arm64

              export GOOS=linux
              export GOARCH=arm
              export GOARM=7
              echo "Building for GOOS=${GOOS}, GOARCH=${GOARCH}, GOARM=${GOARM}"
              make coredns
              cp coredns /work/artifacts/coredns-armhf
            '

          cp coredns/Dockerfile artifacts/Dockerfile

      - name: Upload CoreDNS build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coredns-build-artifacts
          path: artifacts/
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build (${{ matrix.arch }})
    needs: preflight
    if: ${{ inputs.publish_images }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: armhf
            platform: linux/arm/v7
    env:
      VERSION: ${{ inputs.version }}
      RUNTIME_BASE: ${{ inputs.runtime_base }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Download CoreDNS build artifacts
        uses: actions/download-artifact@v8
        with:
          name: coredns-build-artifacts
          path: artifacts

      - name: Prepare build context
        run: |
          set -euo pipefail

          mkdir -p build-context
          cp artifacts/Dockerfile build-context/Dockerfile
          cp artifacts/coredns-${{ matrix.arch }} build-context/coredns
          chmod +x build-context/coredns
          ls -l build-context/coredns
          file build-context/coredns

          case "${{ matrix.arch }}" in
            amd64)
              file build-context/coredns | grep -q 'x86-64'
              ;;
            arm64)
              file build-context/coredns | grep -Eq 'aarch64|ARM aarch64'
              ;;
            armhf)
              file build-context/coredns | grep -Eq 'ARM|EABI5'
              ;;
            *)
              echo "Unknown matrix arch: ${{ matrix.arch }}" >&2
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: build-context/
          file: build-context/Dockerfile
          push: true
          provenance: false
          sbom: false
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE=${{ env.RUNTIME_BASE }}
          tags: |
            tomtonic/coredns-fanout:v${{ env.VERSION }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  manifest:
    name: Create Multi-Arch Manifests
    needs: build
    if: ${{ inputs.publish_images }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Compute floating tags
        id: tags
        run: |
          set -euo pipefail

          VERSION="${{ env.VERSION }}"
          MAJOR_TAG="v$(echo "${VERSION}" | cut -d. -f1)"
          MINOR_TAG="v$(echo "${VERSION}" | cut -d. -f1-2)"

          {
            echo "major_tag=${MAJOR_TAG}"
            echo "minor_tag=${MINOR_TAG}"
          } >> "$GITHUB_OUTPUT"

          case "${{ inputs.channel }}" in
            stable)
              echo "Publishing stable tags: v${VERSION}, ${MINOR_TAG}, ${MAJOR_TAG}, latest"
              ;;
            test)
              echo "Publishing test tags: v${VERSION}, test"
              ;;
            *)
              echo "Unknown publish channel: ${{ inputs.channel }}" >&2
              exit 1
              ;;
          esac

      - name: Create and push immutable multi-arch tag
        run: |
          set -euo pipefail

          SOURCE_AMD64="tomtonic/coredns-fanout:v${{ env.VERSION }}-amd64"
          SOURCE_ARM64="tomtonic/coredns-fanout:v${{ env.VERSION }}-arm64"
          SOURCE_ARMHF="tomtonic/coredns-fanout:v${{ env.VERSION }}-armhf"

          docker buildx imagetools create \
            --tag tomtonic/coredns-fanout:v${{ env.VERSION }} \
            "${SOURCE_AMD64}" "${SOURCE_ARM64}" "${SOURCE_ARMHF}"
          docker buildx imagetools inspect "tomtonic/coredns-fanout:v${{ env.VERSION }}"

      - name: Create and push floating stable tags
        if: ${{ inputs.channel == 'stable' }}
        run: |
          set -euo pipefail

          SOURCE_AMD64="tomtonic/coredns-fanout:v${{ env.VERSION }}-amd64"
          SOURCE_ARM64="tomtonic/coredns-fanout:v${{ env.VERSION }}-arm64"
          SOURCE_ARMHF="tomtonic/coredns-fanout:v${{ env.VERSION }}-armhf"

          docker buildx imagetools create \
            --tag tomtonic/coredns-fanout:${{ steps.tags.outputs.minor_tag }} \
            "${SOURCE_AMD64}" "${SOURCE_ARM64}" "${SOURCE_ARMHF}"
          docker buildx imagetools inspect "tomtonic/coredns-fanout:${{ steps.tags.outputs.minor_tag }}"

          docker buildx imagetools create \
            --tag tomtonic/coredns-fanout:${{ steps.tags.outputs.major_tag }} \
            "${SOURCE_AMD64}" "${SOURCE_ARM64}" "${SOURCE_ARMHF}"
          docker buildx imagetools inspect "tomtonic/coredns-fanout:${{ steps.tags.outputs.major_tag }}"

          docker buildx imagetools create \
            --tag tomtonic/coredns-fanout:latest \
            "${SOURCE_AMD64}" "${SOURCE_ARM64}" "${SOURCE_ARMHF}"
          docker buildx imagetools inspect "tomtonic/coredns-fanout:latest"

      - name: Create and push floating test tag
        if: ${{ inputs.channel == 'test' }}
        run: |
          set -euo pipefail

          SOURCE_AMD64="tomtonic/coredns-fanout:v${{ env.VERSION }}-amd64"
          SOURCE_ARM64="tomtonic/coredns-fanout:v${{ env.VERSION }}-arm64"
          SOURCE_ARMHF="tomtonic/coredns-fanout:v${{ env.VERSION }}-armhf"

          docker buildx imagetools create \
            --tag tomtonic/coredns-fanout:test \
            "${SOURCE_AMD64}" "${SOURCE_ARM64}" "${SOURCE_ARMHF}"
          docker buildx imagetools inspect "tomtonic/coredns-fanout:test"
