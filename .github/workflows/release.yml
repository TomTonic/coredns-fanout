name: Publish Production Release

on:
  release:
    types:
      - published

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate Release Metadata
    if: github.event.release.prerelease == false && github.event.release.draft == false
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      coredns_tag: ${{ steps.release.outputs.coredns_tag }}
      fanout_tag: ${{ steps.release.outputs.fanout_tag }}
      filterlist_tag: ${{ steps.release.outputs.filterlist_tag }}
      go_image: ${{ steps.release.outputs.go_image }}
      runtime_base: ${{ steps.release.outputs.runtime_base }}
      go_version: ${{ steps.release.outputs.go_version }}
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure release commit is on main
        run: |
          set -euo pipefail

          git fetch origin main --depth=1
          git merge-base --is-ancestor HEAD origin/main

      - name: Validate release tag and build metadata
        id: release
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ github.event.release.tag_name }}"
          if ! printf '%s' "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "GitHub release tag must use the format vX.Y.Z." >&2
            exit 1
          fi

          VERSION="${RELEASE_TAG#v}"

          COREDNS_TAG=$(jq -r '.coredns_tag // ""' build-versions.json)
          FANOUT_TAG=$(jq -r '.fanout_tag // ""' build-versions.json)
          FILTERLIST_TAG=$(jq -r '.filterlist_tag // ""' build-versions.json)
          GO_IMAGE=$(jq -r '.go_image // ""' build-versions.json)
          RUNTIME_BASE=$(jq -r '.runtime_base // ""' build-versions.json)
          IMAGE_WITHOUT_DIGEST="${GO_IMAGE%@*}"
          IMAGE_TAG="${IMAGE_WITHOUT_DIGEST##*:}"
          EXPECTED_GO_VERSION="${IMAGE_TAG%%-*}"
          GO_TOOLCHAIN=$(docker run --rm --platform linux/amd64 "${GO_IMAGE}" go version | awk '{print $3, $4}')
          GO_VERSION=$(printf '%s\n' "${GO_TOOLCHAIN}" | awk '{print $1}' | sed 's/^go//')

          if [ -z "${COREDNS_TAG}" ] || [ -z "${FANOUT_TAG}" ] || [ -z "${FILTERLIST_TAG}" ] || [ -z "${GO_IMAGE}" ] || [ -z "${RUNTIME_BASE}" ] || [ -z "${GO_VERSION}" ]; then
            echo "build-versions.json is missing required release metadata." >&2
            exit 1
          fi

          if [ -z "${EXPECTED_GO_VERSION}" ] || [ "${EXPECTED_GO_VERSION}" = "${IMAGE_WITHOUT_DIGEST}" ]; then
            echo "Unable to derive expected Go version from go_image: ${GO_IMAGE}" >&2
            exit 1
          fi

          if [ "${GO_VERSION}" != "${EXPECTED_GO_VERSION}" ]; then
            echo "Pinned go_image tag does not match the Go toolchain inside the image." >&2
            exit 1
          fi

          {
            echo "version=${VERSION}"
            echo "coredns_tag=${COREDNS_TAG}"
            echo "fanout_tag=${FANOUT_TAG}"
            echo "filterlist_tag=${FILTERLIST_TAG}"
            echo "go_image=${GO_IMAGE}"
            echo "runtime_base=${RUNTIME_BASE}"
            echo "go_version=${GO_VERSION}"
          } >> "$GITHUB_OUTPUT"

  publish-release-images:
    name: Publish Production Images
    needs: validate-release
    if: github.event.release.prerelease == false && github.event.release.draft == false
    uses: ./.github/workflows/publish-images.yml
    with:
      git_ref: ${{ github.event.release.tag_name }}
      version: ${{ needs.validate-release.outputs.version }}
      coredns_tag: ${{ needs.validate-release.outputs.coredns_tag }}
      fanout_tag: ${{ needs.validate-release.outputs.fanout_tag }}
      filterlist_tag: ${{ needs.validate-release.outputs.filterlist_tag }}
      go_image: ${{ needs.validate-release.outputs.go_image }}
      runtime_base: ${{ needs.validate-release.outputs.runtime_base }}
      channel: stable
      publish_images: true
    secrets: inherit

  sync-version-tracking:
    name: Sync version.json to Release
    needs: [validate-release, publish-release-images]
    if: github.event.release.prerelease == false && github.event.release.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Update version.json from release
        run: |
          set -euo pipefail

          jq \
            --arg v "${{ needs.validate-release.outputs.version }}" \
            --arg c "${{ needs.validate-release.outputs.coredns_tag }}" \
            --arg f "${{ needs.validate-release.outputs.fanout_tag }}" \
            --arg fl "${{ needs.validate-release.outputs.filterlist_tag }}" \
            --arg g "${{ needs.validate-release.outputs.go_image }}" \
            --arg gv "${{ needs.validate-release.outputs.go_version }}" \
            --arg a "${{ needs.validate-release.outputs.runtime_base }}" \
            '.version=$v | .coredns=$c | .fanout=$f | .filterlist=$fl | .go=$g | .go_version=$gv | .alpine=$a' \
            version.json > version.json.tmp
          mv version.json.tmp version.json

      - name: Commit and push version.json update
        run: |
          set -euo pipefail

          if git diff --quiet -- version.json; then
            echo "version.json is already in sync."
            exit 0
          fi

          git config user.name "GitHub Action Release Sync"
          git config user.email "action@github.com"
          git add version.json
          git commit -m "Sync version.json to release v${{ needs.validate-release.outputs.version }} [auto]"
          git push origin main
